<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECO-TERRA: วิกฤตโลกหลากยุค</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@500;700;800&family=Prompt:wght@400;500;600&display=swap');

  :root{
    --cream: #fbf6e6;
    --cream-deep: #f4ecd0;
    --forest: #1c6b52;
    --forest-deep: #0f3d2e;
    --forest-light: #2e9370;
    --gold: #d99e2b;
    --gold-soft: #f2c76a;
    --hazard: #d1495b;
    --hazard-soft: #f6d3d8;
    --bonus: #e2933a;
    --bonus-soft: #fbe6c8;
    --quiz: #3f8f5f;
    --quiz-soft: #e3f2e6;
    --special: #2f7ea8;
    --special-soft: #dcedf7;
    --ink: #23321f;
    --muted: #6c7a63;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background: var(--cream-deep); color: var(--ink); font-family:'Prompt',sans-serif; }

  .app{ max-width: 1000px; margin: 0 auto; padding: 18px 14px 50px; }

  .header{
    background: linear-gradient(135deg, var(--forest), var(--forest-deep));
    border-radius: 18px;
    padding: 18px 20px;
    text-align:center;
    color: var(--cream);
    box-shadow: 0 10px 24px rgba(15,61,46,0.35);
  }
  .header h1{
    font-family:'Kanit',sans-serif;
    font-weight:800;
    font-size: clamp(20px, 4.5vw, 30px);
    margin: 0 0 4px;
    color: var(--gold-soft);
  }
  .header p{ margin:0; font-size:13px; color: #cfe6da; }

  /* ---- Setup screen ---- */
  .setup{
    margin-top:18px;
    background:#fff;
    border-radius:16px;
    padding:20px;
    border:1px solid #e7dfc2;
  }
  .setup h2{ font-family:'Kanit',sans-serif; font-size:18px; margin:0 0 12px; color: var(--forest-deep); }
  .player-row{ display:flex; gap:8px; margin-bottom:10px; align-items:center; }
  .player-row input[type=text]{
    flex:1; padding:9px 12px; border-radius:9px; border:1px solid #d8cfae;
    font-family:'Prompt'; font-size:14px; outline:none;
  }
  .player-row input[type=text]:focus{ border-color: var(--forest-light); }
  .swatches{ display:flex; gap:4px; }
  .swatch{ width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
  .swatch.selected{ border-color: var(--ink); }
  .remove-player{ background:none; border:none; color: var(--hazard); font-size:18px; cursor:pointer; padding:0 6px; }

  .setup-actions{ display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
  .btn{
    font-family:'Kanit',sans-serif; font-weight:700; border:none; border-radius:12px;
    padding:11px 18px; cursor:pointer; font-size:15px; transition: transform .12s, box-shadow .12s, opacity .2s;
  }
  .btn:hover:not(:disabled){ transform: translateY(-1px); }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }
  .btn-add{ background: var(--special-soft); color: var(--special); }
  .btn-start{ background: linear-gradient(135deg, var(--gold), var(--bonus)); color:#3a2205; box-shadow:0 6px 16px rgba(217,158,43,.35); }
  .setup-hint{ font-size:12px; color:var(--muted); margin-top:8px; }

  /* ---- Game screen ---- */
  .game{ display:none; margin-top:16px; }
  .game.active{ display:block; }

  .status-bar{
    display:flex; justify-content:space-between; align-items:center;
    background:#fff; border:1px solid #e7dfc2; border-radius:14px;
    padding:10px 16px; margin-bottom:14px; flex-wrap:wrap; gap:10px;
  }
  .turn-indicator{ display:flex; align-items:center; gap:8px; font-weight:600; }
  .turn-dot{ width:16px; height:16px; border-radius:50%; box-shadow:0 0 0 3px rgba(0,0,0,0.06); }
  .players-scores{ display:flex; gap:10px; flex-wrap:wrap; font-size:12px; color:var(--muted); }
  .players-scores span b{ color: var(--ink); }

  .board-wrap{
    background: var(--cream);
    border: 3px solid var(--forest);
    border-radius: 18px;
    padding: 14px;
    box-shadow: inset 0 0 0 6px #fffef8;
  }
  .board{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .cell{
    position:relative;
    border-radius: 10px;
    border: 2px solid transparent;
    padding: 6px 5px;
    min-height: 74px;
    display:flex; flex-direction:column; justify-content:space-between;
    font-size: 10.5px;
    background: #fff;
  }
  .cell .num{ font-weight:700; font-size:11px; }
  .cell .icon{ font-size:18px; text-align:center; }
  .cell .label{ font-weight:600; line-height:1.15; text-align:center; }

  .cell.start{ background: var(--forest); color:#fff; border-color: var(--forest-deep); }
  .cell.finish{ background: linear-gradient(135deg,#1d5e8f,#123a5c); color:#fff; border-color:#0d2a44; }
  .cell.quiz{ background: var(--quiz-soft); border-color: var(--quiz); }
  .cell.bonus{ background: var(--bonus-soft); border-color: var(--bonus); }
  .cell.hazard{ background: var(--hazard-soft); border-color: var(--hazard); }
  .cell.special{ background: var(--special-soft); border-color: var(--special); }

  .tokens{ position:absolute; bottom:3px; left:3px; right:3px; display:flex; gap:2px; flex-wrap:wrap; }
  .token{
    width:13px; height:13px; border-radius:50%;
    border: 1.5px solid rgba(0,0,0,0.25);
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  /* ---- Controls ---- */
  .controls{
    margin-top:16px; background:#fff; border:1px solid #e7dfc2; border-radius:16px;
    padding:18px; text-align:center;
  }
  .die-display{
    width:56px; height:56px; margin:0 auto 10px;
    border-radius:12px; background: var(--forest-deep); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-family:'Kanit'; font-weight:800; font-size:26px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.25);
  }
  .roll-btn{ background: linear-gradient(135deg, var(--hazard), #a83446); color:#fff; }
  .message{ margin-top:12px; min-height:22px; font-weight:600; color: var(--forest-deep); font-size:14px; }
  .next-btn{ background: var(--forest-light); color:#fff; margin-top:10px; display:none; }

  /* ---- Modal (quiz / event) ---- */
  .overlay{
    display:none; position:fixed; inset:0; background: rgba(15,30,20,0.65);
    align-items:center; justify-content:center; padding:16px; z-index:50;
  }
  .overlay.active{ display:flex; }
  .modal{
    background:#fff; border-radius:18px; padding:22px; max-width:420px; width:100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .modal .tag{ font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; margin-bottom:6px; }
  .modal.quiz-modal .tag{ color: var(--quiz); }
  .modal.event-modal .tag{ color: var(--special); }
  .modal h3{ font-family:'Kanit'; font-size:18px; margin: 0 0 14px; color: var(--ink); line-height:1.4; }
  .options{ display:flex; flex-direction:column; gap:8px; margin-bottom: 8px; }
  .option-btn{
    text-align:left; padding:10px 14px; border-radius:10px; border:1.5px solid #ddd4b4;
    background:#fdfaf0; cursor:pointer; font-family:'Prompt'; font-size:14px; color: var(--ink);
  }
  .option-btn.correct{ background: var(--quiz-soft); border-color: var(--quiz); font-weight:700; }
  .option-btn.wrong{ background: var(--hazard-soft); border-color: var(--hazard); }
  .option-btn:disabled{ cursor:default; }
  .modal-close-btn{ margin-top:14px; width:100%; background: var(--forest); color:#fff; }

  .win-overlay .modal{ text-align:center; }
  .win-overlay h3{ font-size:24px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>🌋 ECO-TERRA: วิกฤตโลกหลากยุค 💎</h1>
    <p>บอร์ดเกมสำรวจธรณีวิทยา & พิชิตภัยธรรมชาติ (2–5 คน) — เวอร์ชันเล่นออนไลน์</p>
  </div>

  <!-- SETUP -->
  <div class="setup" id="setupScreen">
    <h2>ตั้งค่าผู้เล่น</h2>
    <div id="playerRows"></div>
    <div class="setup-actions">
      <button class="btn btn-add" id="addPlayerBtn">+ เพิ่มผู้เล่น</button>
      <button class="btn btn-start" id="startGameBtn">🎲 เริ่มเกม</button>
    </div>
    <div class="setup-hint" id="setupHint">ใส่ชื่อผู้เล่น 2–5 คน แล้วเลือกสี</div>
  </div>

  <!-- GAME -->
  <div class="game" id="gameScreen">
    <div class="status-bar">
      <div class="turn-indicator">
        <div class="turn-dot" id="turnDot"></div>
        <span id="turnLabel">ตาของ...</span>
      </div>
      <div class="players-scores" id="playersScores"></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>

    <div class="controls">
      <div class="die-display" id="dieDisplay">–</div>
      <button class="btn roll-btn" id="rollBtn">ทอยลูกเต๋า</button>
      <div class="message" id="message"></div>
      <button class="btn next-btn" id="nextBtn">ผู้เล่นถัดไป →</button>
    </div>
  </div>

</div>

<!-- Quiz / Event modal -->
<div class="overlay" id="modalOverlay">
  <div class="modal quiz-modal" id="modalBox">
    <div class="tag" id="modalTag">คำถามธรณี</div>
    <h3 id="modalQuestion">...</h3>
    <div class="options" id="modalOptions"></div>
    <button class="btn modal-close-btn" id="modalCloseBtn" style="display:none;">ไปต่อ</button>
  </div>
</div>

<!-- Win overlay -->
<div class="overlay win-overlay" id="winOverlay">
  <div class="modal">
    <div class="tag" style="color:var(--gold);">🏆 จบเกม</div>
    <h3 id="winText">...</h3>
    <button class="btn btn-start" id="playAgainBtn">เล่นใหม่</button>
  </div>
</div>

<script>
// ---------------- Data ----------------
const COLORS = ['#d1495b','#2f7ea8','#e2933a','#3f8f5f','#8e5db0'];

const QUIZ_QUESTIONS = [
  { q: "ชั้นหินชนิดใดเกิดจากการทับถมของตะกอน?", options:["หินอัคนี","หินตะกอน","หินแปร","หินหนืด"], correct:1 },
  { q: "ไดโนเสาร์สูญพันธุ์เมื่อประมาณกี่ล้านปีก่อน?", options:["6.6 ล้านปี","1 ล้านปี","100 ล้านปี","65,000 ปี"], correct:0 },
  { q: "แผ่นเปลือกโลกเคลื่อนที่เพราะอะไรเป็นหลัก?", options:["แรงลม","การพาความร้อนในชั้นแมนเทิล","แรงโน้มถ่วงดวงจันทร์","คลื่นสึนามิ"], correct:1 },
  { q: "หินอัคนีเกิดจากอะไร?", options:["การแข็งตัวของแมกมา/ลาวา","การทับถมของเปลือกหอย","แรงกดดันใต้ทะเล","การผุพังของหินปูน"], correct:0 },
  { q: "จุดศูนย์กลางแผ่นดินไหวใต้ผิวโลกเรียกว่าอะไร?", options:["ไฮโปเซนเตอร์ (โฟกัส)","อิพิเซนเตอร์","แมกมาแชมเบอร์","ร่องลึกก้นสมุทร"], correct:0 },
  { q: "ทวีปทั้งหมดเคยรวมกันเป็นผืนเดียวเรียกว่าอะไร?", options:["แพนเจีย","แอตแลนติส","กอนด์วานา","ยูเรเซีย"], correct:0 },
  { q: "หินงอกหินย้อยในถ้ำเกิดจากแร่ชนิดใดเป็นหลัก?", options:["ควอตซ์","แคลไซต์","เฟลด์สปาร์","ไมกา"], correct:1 },
  { q: "ซากดึกดำบรรพ์ (ฟอสซิล) ส่วนใหญ่พบในหินชนิดใด?", options:["หินตะกอน","หินอัคนี","หินแปร","หินภูเขาไฟ"], correct:0 },
  { q: "วงแหวนแห่งไฟ (Ring of Fire) เกี่ยวข้องกับปรากฏการณ์ใด?", options:["ภูเขาไฟและแผ่นดินไหวรอบมหาสมุทรแปซิฟิก","กระแสน้ำอุ่น","การเกิดฝนกรด","หลุมอุกกาบาต"], correct:0 },
  { q: "ยุคใดที่ไดโนเสาร์ครองโลก?", options:["ยุคมีโซโซอิก","ยุคพาลีโอโซอิก","ยุคซีโนโซอิก","ยุคพรีแคมเบรียน"], correct:0 },
  { q: "ทซึนามิส่วนใหญ่เกิดจากอะไร?", options:["พายุ","แผ่นดินไหวใต้ทะเล","น้ำขึ้นน้ำลง","ภาวะโลกร้อน"], correct:1 },
  { q: "แร่ที่แข็งที่สุดตามสเกลโมส์คือแร่ใด?", options:["เพชร","ควอตซ์","แกรนิต","ทองคำ"], correct:0 },
];

const EVENT_CARDS = [
  { text: "แผ่นดินไหวเขย่าทั่วโลก! ผู้เล่นทุกคนถอยหลัง 1 ช่อง", effect: "all_back_1" },
  { text: "นักธรณีวิทยาค้นพบชั้นหินใหม่ คุณได้เดินหน้า 2 ช่อง", effect: "self_fwd_2" },
  { text: "ฝนตกหนักทำให้ทางเดินเป็นโคลน คุณต้องหยุดพัก 1 ตา", effect: "self_skip" },
  { text: "พบถ้ำหินปูนสวยงาม ทุกคนได้แรงบันดาลใจ เดินหน้าคนละ 1 ช่อง", effect: "all_fwd_1" },
  { text: "อุกกาบาตพุ่งชน! คุณถอยหลัง 3 ช่อง", effect: "self_back_3" },
];

// Board path: index 0 = START, 1-9, 10 = FINISH, 11-19 = spaces 12-20
const BOARD = [
  { id:'START', label:'จุดเริ่มต้น', icon:'🚩', type:'start' },
  { id:'1', label:'คำถามธรณี', icon:'❓', type:'quiz' },
  { id:'2', label:'ขุดพบฟอสซิล (+2)', icon:'🦴', type:'bonus', amount:2 },
  { id:'3', label:'แผ่นดินไหว (จั่วการ์ด)', icon:'💥', type:'event' },
  { id:'4', label:'คำถามธรณี', icon:'❓', type:'quiz' },
  { id:'5', label:'แผ่นเทคโทนิก (เคลื่อนตัว)', icon:'🗺️', type:'event' },
  { id:'6', label:'คำถามธรณี', icon:'❓', type:'quiz' },
  { id:'7', label:'สึนามิซัด (ถอย 1)', icon:'🌊', type:'hazard', amount:1 },
  { id:'8', label:'พบสายแร่ (+1)', icon:'💎', type:'bonus', amount:1 },
  { id:'9', label:'คำถามธรณี', icon:'❓', type:'quiz' },
  { id:'10-11', label:'FINISH โลกสมบูรณ์', icon:'🏆', type:'finish' },
  { id:'12', label:'คำถามธรณี', icon:'❓', type:'quiz' },
  { id:'13', label:'ลาวาหลาก (ถอย 2)', icon:'🔥', type:'hazard', amount:2 },
  { id:'14', label:'คำถามธรณี', icon:'❓', type:'quiz' },
  { id:'15', label:'ดินถล่ม (หยุด 1 ตา)', icon:'⛰️', type:'skip' },
  { id:'16', label:'คำถามธรณี', icon:'❓', type:'quiz' },
  { id:'17', label:'ฟอสซิล T-Rex (+3)', icon:'🦖', type:'bonus', amount:3 },
  { id:'18', label:'สำรวจถ้ำปูน', icon:'🧗', type:'event' },
  { id:'19', label:'คำถามธรณี', icon:'❓', type:'quiz' },
  { id:'20', label:'ภูเขาไฟระเบิด (-2)', icon:'🌋', type:'hazard', amount:2 },
];
const FINISH_INDEX = BOARD.findIndex(c => c.type === 'finish');

// ---------------- State ----------------
let players = [];
let currentPlayerIdx = 0;
let awaitingCellEffect = false;

// ---------------- Setup screen ----------------
const playerRowsEl = document.getElementById('playerRows');
const setupHint = document.getElementById('setupHint');
let setupPlayers = [
  { name:'', color: COLORS[0] },
  { name:'', color: COLORS[1] },
];

function renderSetupRows(){
  playerRowsEl.innerHTML = '';
  setupPlayers.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'player-row';

    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = `ชื่อผู้เล่น ${i+1}`;
    input.value = p.name;
    input.maxLength = 14;
    input.oninput = (e) => { setupPlayers[i].name = e.target.value; };
    row.appendChild(input);

    const swatchWrap = document.createElement('div');
    swatchWrap.className = 'swatches';
    COLORS.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'swatch' + (p.color === c ? ' selected' : '');
      sw.style.background = c;
      sw.onclick = () => { setupPlayers[i].color = c; renderSetupRows(); };
      swatchWrap.appendChild(sw);
    });
    row.appendChild(swatchWrap);

    if(setupPlayers.length > 2){
      const rm = document.createElement('button');
      rm.className = 'remove-player';
      rm.textContent = '×';
      rm.onclick = () => { setupPlayers.splice(i,1); renderSetupRows(); };
      row.appendChild(rm);
    }
    playerRowsEl.appendChild(row);
  });
}
renderSetupRows();

document.getElementById('addPlayerBtn').onclick = () => {
  if(setupPlayers.length >= 5){ setupHint.textContent = 'เพิ่มได้สูงสุด 5 คน'; return; }
  const usedColors = setupPlayers.map(p => p.color);
  const nextColor = COLORS.find(c => !usedColors.includes(c)) || COLORS[0];
  setupPlayers.push({ name:'', color: nextColor });
  renderSetupRows();
};

document.getElementById('startGameBtn').onclick = () => {
  const valid = setupPlayers.filter(p => p.name.trim() !== '');
  if(valid.length < 2){
    setupHint.textContent = 'กรุณาใส่ชื่อผู้เล่นอย่างน้อย 2 คน';
    return;
  }
  players = valid.map(p => ({ name: p.name.trim(), color: p.color, position: 0, skipNext: false }));
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.add('active');
  renderBoard();
  updateStatusBar();
};

// ---------------- Board rendering ----------------
const boardEl = document.getElementById('board');
function renderBoard(){
  boardEl.innerHTML = '';
  BOARD.forEach((cell, idx) => {
    const div = document.createElement('div');
    div.className = 'cell ' + cell.type;
    div.innerHTML = `
      <div class="num">${cell.id}</div>
      <div class="icon">${cell.icon}</div>
      <div class="label">${cell.label}</div>
      <div class="tokens" id="tokens-${idx}"></div>
    `;
    boardEl.appendChild(div);
  });
  placeTokens();
}

function placeTokens(){
  BOARD.forEach((_, idx) => {
    const t = document.getElementById('tokens-' + idx);
    if(t) t.innerHTML = '';
  });
  players.forEach(p => {
    const t = document.getElementById('tokens-' + p.position);
    if(t){
      const dot = document.createElement('div');
      dot.className = 'token';
      dot.style.background = p.color;
      dot.title = p.name;
      t.appendChild(dot);
    }
  });
}

// ---------------- Status bar ----------------
function updateStatusBar(){
  const cur = players[currentPlayerIdx];
  document.getElementById('turnDot').style.background = cur.color;
  document.getElementById('turnLabel').textContent = `ตาของ ${cur.name}`;
  const scoresEl = document.getElementById('playersScores');
  scoresEl.innerHTML = players.map(p =>
    `<span style="color:${p.color}"><b>${p.name}</b>: ช่อง ${p.position === 0 ? 'START' : BOARD[p.position].id}</span>`
  ).join('');
}

// ---------------- Turn / dice logic ----------------
const rollBtn = document.getElementById('rollBtn');
const nextBtn = document.getElementById('nextBtn');
const messageEl = document.getElementById('message');
const dieDisplay = document.getElementById('dieDisplay');

rollBtn.onclick = () => {
  const cur = players[currentPlayerIdx];
  if(cur.skipNext){
    cur.skipNext = false;
    messageEl.textContent = `${cur.name} ต้องหยุดพัก 1 ตา (ข้ามตานี้)`;
    dieDisplay.textContent = '–';
    rollBtn.style.display = 'none';
    nextBtn.style.display = 'inline-block';
    return;
  }

  rollBtn.disabled = true;
  let rolls = 0;
  const rollAnim = setInterval(() => {
    dieDisplay.textContent = 1 + Math.floor(Math.random()*6);
    rolls++;
    if(rolls > 8){
      clearInterval(rollAnim);
      const finalRoll = 1 + Math.floor(Math.random()*6);
      dieDisplay.textContent = finalRoll;
      movePlayer(cur, finalRoll);
    }
  }, 80);
};

function movePlayer(player, steps){
  let newPos = player.position + steps;
  if(newPos >= FINISH_INDEX){
    player.position = FINISH_INDEX;
    placeTokens();
    updateStatusBar();
    showWin(player);
    return;
  }
  player.position = newPos;
  placeTokens();
  updateStatusBar();
  applyCellEffect(player, BOARD[newPos]);
}

function applyCellEffect(player, cell){
  rollBtn.style.display = 'none';

  switch(cell.type){
    case 'quiz':
      showQuiz(player);
      break;
    case 'bonus':
      messageEl.textContent = `${player.name} ${cell.label} — เดินหน้าอีก ${cell.amount} ช่อง!`;
      advance(player, cell.amount, true);
      break;
    case 'hazard':
      messageEl.textContent = `${player.name} เจอ${cell.label}!`;
      advance(player, -cell.amount, true);
      break;
    case 'skip':
      messageEl.textContent = `${player.name} เจอดินถล่ม ต้องหยุดพัก 1 ตาถัดไป`;
      player.skipNext = true;
      finishTurn();
      break;
    case 'event':
      showEvent(player);
      break;
    default:
      finishTurn();
  }
}

function advance(player, amount, silentIfNoModal){
  let newPos = player.position + amount;
  if(newPos < 0) newPos = 0;
  if(newPos >= FINISH_INDEX){
    player.position = FINISH_INDEX;
    placeTokens();
    updateStatusBar();
    showWin(player);
    return;
  }
  player.position = newPos;
  placeTokens();
  updateStatusBar();
  if(silentIfNoModal) finishTurn();
}

function finishTurn(){
  nextBtn.style.display = 'inline-block';
}

nextBtn.onclick = () => {
  nextBtn.style.display = 'none';
  rollBtn.style.display = 'inline-block';
  rollBtn.disabled = false;
  dieDisplay.textContent = '–';
  messageEl.textContent = '';
  currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
  updateStatusBar();
};

// ---------------- Quiz modal ----------------
const modalOverlay = document.getElementById('modalOverlay');
const modalBox = document.getElementById('modalBox');
const modalTag = document.getElementById('modalTag');
const modalQuestion = document.getElementById('modalQuestion');
const modalOptions = document.getElementById('modalOptions');
const modalCloseBtn = document.getElementById('modalCloseBtn');

function showQuiz(player){
  const q = QUIZ_QUESTIONS[Math.floor(Math.random() * QUIZ_QUESTIONS.length)];
  modalBox.className = 'modal quiz-modal';
  modalTag.textContent = 'คำถามธรณี — ' + player.name;
  modalQuestion.textContent = q.q;
  modalOptions.innerHTML = '';
  modalCloseBtn.style.display = 'none';

  q.options.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'option-btn';
    b.textContent = opt;
    b.onclick = () => {
      document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
      if(i === q.correct){
        b.classList.add('correct');
        messageEl.textContent = `${player.name} ตอบถูก! เดินหน้าโบนัส 1 ช่อง`;
      } else {
        b.classList.add('wrong');
        modalOptions.children[q.correct].classList.add('correct');
        messageEl.textContent = `${player.name} ตอบผิด — ไม่ได้โบนัส`;
      }
      modalCloseBtn.style.display = 'block';
      modalCloseBtn.onclick = () => {
        modalOverlay.classList.remove('active');
        if(i === q.correct){
          advance(player, 1, true);
        } else {
          finishTurn();
        }
      };
    };
    modalOptions.appendChild(b);
  });

  modalOverlay.classList.add('active');
}

// ---------------- Event card modal ----------------
function showEvent(player){
  const card = EVENT_CARDS[Math.floor(Math.random() * EVENT_CARDS.length)];
  modalBox.className = 'modal event-modal';
  modalTag.textContent = 'การ์ดเหตุการณ์ธรณี';
  modalQuestion.textContent = card.text;
  modalOptions.innerHTML = '';
  modalCloseBtn.style.display = 'block';
  modalCloseBtn.onclick = () => {
    modalOverlay.classList.remove('active');
    runEventEffect(player, card.effect);
  };
  modalOverlay.classList.add('active');
}

function runEventEffect(player, effect){
  switch(effect){
    case 'all_back_1':
      players.forEach(p => { p.position = Math.max(0, p.position - 1); });
      placeTokens(); updateStatusBar();
      finishTurn();
      break;
    case 'self_fwd_2':
      advance(player, 2, true);
      break;
    case 'self_skip':
      player.skipNext = true;
      finishTurn();
      break;
    case 'all_fwd_1':
      let winnerTriggered = false;
      players.forEach(p => {
        p.position = Math.min(FINISH_INDEX, p.position + 1);
        if(p.position >= FINISH_INDEX) winnerTriggered = true;
      });
      placeTokens(); updateStatusBar();
      if(winnerTriggered){ showWin(players.find(p => p.position >= FINISH_INDEX)); }
      else finishTurn();
      break;
    case 'self_back_3':
      advance(player, -3, true);
      break;
    default:
      finishTurn();
  }
}

// ---------------- Win ----------------
const winOverlay = document.getElementById('winOverlay');
function showWin(player){
  document.getElementById('winText').innerHTML = `<span style="color:${player.color}">${player.name}</span> พิชิตโลกสมบูรณ์ก่อนใคร! 🌍✨`;
  winOverlay.classList.add('active');
}

document.getElementById('playAgainBtn').onclick = () => {
  winOverlay.classList.remove('active');
  players.forEach(p => { p.position = 0; p.skipNext = false; });
  currentPlayerIdx = 0;
  placeTokens();
  updateStatusBar();
  rollBtn.style.display = 'inline-block';
  rollBtn.disabled = false;
  nextBtn.style.display = 'none';
  dieDisplay.textContent = '–';
  messageEl.textContent = '';
};
</script>
