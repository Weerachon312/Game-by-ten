<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECO-TERRA: วิกฤตโลกหลากยุค</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@500;700;800&family=Prompt:wght@400;500;600&display=swap');

    :root{
        --cream: #fbf6e6;
            --cream-deep: #f4ecd0;
                --forest: #1c6b52;
                    --forest-deep: #0f3d2e;
                        --forest-light: #2e9370;
                            --gold: #d99e2b;
                                --gold-soft: #f2c76a;
                                    --hazard: #d1495b;
                                        --hazard-soft: #f6d3d8;
                                            --bonus: #e2933a;
                                                --bonus-soft: #fbe6c8;
                                                    --quiz: #3f8f5f;
                                                        --quiz-soft: #e3f2e6;
                                                            --special: #2f7ea8;
                                                                --special-soft: #dcedf7;
                                                                    --ink: #23321f;
                                                                        --muted: #6c7a63;
                                                                          }

                                                                            *{ box-sizing:border-box; }
                                                                              html,body{ margin:0; padding:0; background: var(--cream-deep); color: var(--ink); font-family:'Prompt',sans-serif; }

                                                                                .app{ max-width: 1000px; margin: 0 auto; padding: 18px 14px 50px; }

                                                                                  .header{
                                                                                      background: linear-gradient(135deg, var(--forest), var(--forest-deep));
                                                                                          border-radius: 18px;
                                                                                              padding: 18px 20px;
                                                                                                  text-align:center;
                                                                                                      color: var(--cream);
                                                                                                          box-shadow: 0 10px 24px rgba(15,61,46,0.35);
                                                                                                            }
                                                                                                              .header h1{
                                                                                                                  font-family:'Kanit',sans-serif;
                                                                                                                      font-weight:800;
                                                                                                                          font-size: clamp(20px, 4.5vw, 30px);
                                                                                                                              margin: 0 0 4px;
                                                                                                                                  color: var(--gold-soft);
                                                                                                                                    }
                                                                                                                                      .header p{ margin:0; font-size:13px; color: #cfe6da; }

                                                                                                                                        /* ---- Setup screen ---- */
                                                                                                                                          .setup{
                                                                                                                                              margin-top:18px;
                                                                                                                                                  background:#fff;
                                                                                                                                                      border-radius:16px;
                                                                                                                                                          padding:20px;
                                                                                                                                                              border:1px solid #e7dfc2;
                                                                                                                                                                }
                                                                                                                                                                  .setup h2{ font-family:'Kanit',sans-serif; font-size:18px; margin:0 0 12px; color: var(--forest-deep); }
                                                                                                                                                                    .player-row{ display:flex; gap:8px; margin-bottom:10px; align-items:center; }
                                                                                                                                                                      .player-row input[type=text]{
                                                                                                                                                                          flex:1; padding:9px 12px; border-radius:9px; border:1px solid #d8cfae;
                                                                                                                                                                              font-family:'Prompt'; font-size:14px; outline:none;
                                                                                                                                                                                }
                                                                                                                                                                                  .player-row input[type=text]:focus{ border-color: var(--forest-light); }
                                                                                                                                                                                    .swatches{ display:flex; gap:4px; }
                                                                                                                                                                                      .swatch{ width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
                                                                                                                                                                                        .swatch.selected{ border-color: var(--ink); }
                                                                                                                                                                                          .remove-player{ background:none; border:none; color: var(--hazard); font-size:18px; cursor:pointer; padding:0 6px; }

                                                                                                                                                                                            .setup-actions{ display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
                                                                                                                                                                                              .btn{
                                                                                                                                                                                                  font-family:'Kanit',sans-serif; font-weight:700; border:none; border-radius:12px;
                                                                                                                                                                                                      padding:11px 18px; cursor:pointer; font-size:15px; transition: transform .12s, box-shadow .12s, opacity .2s;
                                                                                                                                                                                                        }
                                                                                                                                                                                                          .btn:hover:not(:disabled){ transform: translateY(-1px); }
                                                                                                                                                                                                            .btn:disabled{ opacity:.45; cursor:not-allowed; }
                                                                                                                                                                                                              .btn-add{ background: var(--special-soft); color: var(--special); }
                                                                                                                                                                                                                .btn-start{ background: linear-gradient(135deg, var(--gold), var(--bonus)); color:#3a2205; box-shadow:0 6px 16px rgba(217,158,43,.35); }
                                                                                                                                                                                                                  .setup-hint{ font-size:12px; color:var(--muted); margin-top:8px; }

                                                                                                                                                                                                                    /* ---- Game screen ---- */
                                                                                                                                                                                                                      .game{ display:none; margin-top:16px; }
                                                                                                                                                                                                                        .game.active{ display:block; }

                                                                                                                                                                                                                          .status-bar{
                                                                                                                                                                                                                              display:flex; justify-content:space-between; align-items:center;
                                                                                                                                                                                                                                  background:#fff; border:1px solid #e7dfc2; border-radius:14px;
                                                                                                                                                                                                                                      padding:10px 16px; margin-bottom:14px; flex-wrap:wrap; gap:10px;
                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                          .turn-indicator{ display:flex; align-items:center; gap:8px; font-weight:600; }
                                                                                                                                                                                                                                            .turn-dot{ width:16px; height:16px; border-radius:50%; box-shadow:0 0 0 3px rgba(0,0,0,0.06); }
                                                                                                                                                                                                                                              .players-scores{ display:flex; gap:10px; flex-wrap:wrap; font-size:12px; color:var(--muted); }
                                                                                                                                                                                                                                                .players-scores span b{ color: var(--ink); }

                                                                                                                                                                                                                                                  .board-wrap{
                                                                                                                                                                                                                                                      background: var(--cream);
                                                                                                                                                                                                                                                          border: 3px solid var(--forest);
                                                                                                                                                                                                                                                              border-radius: 18px;
                                                                                                                                                                                                                                                                  padding: 14px;
                                                                                                                                                                                                                                                                      box-shadow: inset 0 0 0 6px #fffef8;
                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                          .board{
                                                                                                                                                                                                                                                                              display:grid;
                                                                                                                                                                                                                                                                                  grid-template-columns: repeat(7, 1fr);
                                                                                                                                                                                                                                                                                      gap: 6px;
                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                          .cell{
                                                                                                                                                                                                                                                                                              position:relative;
                                                                                                                                                                                                                                                                                                  border-radius: 10px;
                                                                                                                                                                                                                                                                                                      border: 2px solid transparent;
                                                                                                                                                                                                                                                                                                          padding: 6px 5px;
                                                                                                                                                                                                                                                                                                              min-height: 74px;
                                                                                                                                                                                                                                                                                                                  display:flex; flex-direction:column; justify-content:space-between;
                                                                                                                                                                                                                                                                                                                      font-size: 10.5px;
                                                                                                                                                                                                                                                                                                                          background: #fff;
                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                              .cell .num{ font-weight:700; font-size:11px; }
                                                                                                                                                                                                                                                                                                                                .cell .icon{ font-size:18px; text-align:center; }
                                                                                                                                                                                                                                                                                                                                  .cell .label{ font-weight:600; line-height:1.15; text-align:center; }

                                                                                                                                                                                                                                                                                                                                    .cell.start{ background: var(--forest); color:#fff; border-color: var(--forest-deep); }
                                                                                                                                                                                                                                                                                                                                      .cell.finish{ background: linear-gradient(135deg,#1d5e8f,#123a5c); color:#fff; border-color:#0d2a44; }
                                                                                                                                                                                                                                                                                                                                        .cell.quiz{ background: var(--quiz-soft); border-color: var(--quiz); }
                                                                                                                                                                                                                                                                                                                                          .cell.bonus{ background: var(--bonus-soft); border-color: var(--bonus); }
                                                                                                                                                                                                                                                                                                                                            .cell.hazard{ background: var(--hazard-soft); border-color: var(--hazard); }
                                                                                                                                                                                                                                                                                                                                              .cell.special{ background: var(--special-soft); border-color: var(--special); }

                                                                                                                                                                                                                                                                                                                                                .tokens{ position:absolute; bottom:3px; left:3px; right:3px; display:flex; gap:2px; flex-wrap:wrap; }
                                                                                                                                                                                                                                                                                                                                                  .token{
                                                                                                                                                                                                                                                                                                                                                      width:13px; height:13px; border
